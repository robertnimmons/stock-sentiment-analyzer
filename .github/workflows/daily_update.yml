name: Daily Stock Analysis with Website Update

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 9 AM UTC, Monday-Friday
    - cron: '0 21 * * 1-5'  # 9 PM UTC, after-hours
  workflow_dispatch:         # Manual trigger

jobs:
  analyze-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # removed: transformers, torch, matplotlib, numpy — not used by the script
          pip install yfinance==0.2.18 pandas requests --no-cache-dir

      - name: Run stock analysis
        env:
          ALPHAVANTAGE_KEY: ${{ secrets.ALPHAVANTAGE_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python analyzer.py   

      - name: Create website files
        run: |
          # Skip Jekyll — serve files as-is
          touch .nojekyll

          # Main page
          cp results.html index.html

          # API endpoint
          mkdir -p api
          cp results.json api/data.json

          # Historical archive
          mkdir -p data/$(date +%Y)/$(date +%m)
          cp results.json "data/$(date +%Y)/$(date +%m)/$(date +%Y-%m-%d).json"

          # Latest snapshot
          cp results.json latest.json

          echo "Website files ready:"
          ls -la

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./   # upload whole repo (index.html, api/, data/, etc.)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit historical data to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ latest.json results.json results.html summary.txt index.html
          git diff --staged --quiet || git commit -m "Daily stock data: $(date)"
          git fetch origin main
          git merge origin/main --no-edit
          git push
